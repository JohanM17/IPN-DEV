services:
  # Base de datos: Usamos MySQL 8.0
  db:
    image: mysql:8.0
    container_name: ipn_dev_db
    restart: always
    environment:
      MYSQL_DATABASE: ipn_dev_db
      MYSQL_ROOT_PASSWORD: password
    ports:
      - "3306:3306"
    volumes:
      - db_data:/var/lib/mysql

  # Backend: Usa el Dockerfile que acabamos de crear en /backend
  backend:
    build:
      context: ./backend
    container_name: ipn_dev_backend
    restart: always
    volumes:
      - ./backend:/var/www/html
    ports:
      - "8000:80"
    depends_on:
      - db

  # Frontend: Usa Node.js 20 para Next.js
  frontend:
    image: node:20-alpine
    container_name: ipn_dev_frontend
    working_dir: /app
    volumes:
      - ./frontend:/app
    ports:
      - "3000:3000"
    # Al arrancar, instala dependencias si no existen y lanza el modo dev
    command: sh -c "npm install && npm run dev"

volumes:
  db_data:
